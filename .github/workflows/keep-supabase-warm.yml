name: Keep Supabase warm

# Supabase free projects pause after ~7 days of inactivity. This makes a tiny
# authenticated REST request once a day so the project never sleeps. The query
# returns no rows (RLS blocks the anon role) but still executes against the DB.

on:
  schedule:
    - cron: "17 14 * * *" # daily at 14:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/customers?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $code"
          # 200 (rows) or 401/403 (RLS) all mean the project is awake.
          test "$code" -ge 200 -a "$code" -lt 500
